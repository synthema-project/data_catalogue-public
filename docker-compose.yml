version: "3.9"

services:
  postgres_db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - .env.postgresql
    volumes:
      - ./postgres_db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - synthema-data-catalogue
    ports:
      - "5432:5432"

  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    env_file: .env.api
    environment:
      POSTGRES_HOST: postgres_db
      POSTGRES_PORT: "5432"
      DATABASE_PATH: /app/data/database
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - synthema-data-catalogue
    ports:
      - "8080:83"

networks:
  synthema-data-catalogue:
    driver: bridge

volumes:
  postgres_data: